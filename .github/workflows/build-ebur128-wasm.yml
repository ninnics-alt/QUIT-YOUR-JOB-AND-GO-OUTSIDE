name: Build libebur128 WASM

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install emsdk and build WASM
        run: |
          set -e
          # Install emsdk
          git clone https://github.com/emscripten-core/emsdk.git emsdk-build
          cd emsdk-build
          ./emsdk install 3.1.39
          ./emsdk activate 3.1.39
          source ./emsdk_env.sh
          
          # Clone and build libebur128
          cd ..
          git clone https://github.com/ebu/libebur128.git libebur128
          cd libebur128
          source ../emsdk-build/emsdk_env.sh
          emconfigure ./configure
          emmake make
          
          # Build wrapper + WASM
          cd ..
          source ./emsdk-build/emsdk_env.sh
          emcc src/wasm/wrapper.c \
            -I libebur128/include \
            -L libebur128/.libs -lebur128 \
            -O3 \
            -s EXTRA_EXPORTED_RUNTIME_METHODS='["cwrap"]' \
            -s EXPORTED_FUNCTIONS='["_eb_init","_eb_add_samples","_eb_get_i_loudness","_eb_reset"]' \
            -o src/wasm/ebur128.js

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ebur128-wasm
          path: |
            src/wasm/ebur128.js
            src/wasm/ebur128.wasm
